spring:
  application:
    name: raspi-finance-endpoint

  # Jackson Configuration - Critical for Kotlin data class deserialization
  jackson:
    deserialization:
      FAIL_ON_NULL_FOR_PRIMITIVES: false
      FAIL_ON_UNKNOWN_PROPERTIES: false
    module:
      kotlin:
        null-is-same-as-default: true

  # GraphQL Configuration for Spring Boot 4.0
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: /graphql
    schema:
      printer:
        enabled: false
      locations: classpath:graphql/
      file-extensions: .graphqls,.gqls

  profiles:
    # Default profile — overridden by SPRING_PROFILES_ACTIVE env var in all deployment env files.
    # Running without an env file (e.g. bare `./gradlew bootRun`) activates prod, which requires
    # SSL_KEY_STORE_PASSWORD, JWT_KEY, DATASOURCE_PASSWORD, and sslmode in the DATASOURCE URL.
    active: prod
