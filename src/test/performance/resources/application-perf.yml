server:
  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: raspi-finance-endpoint
  autoconfigure:
    exclude: org.springframework.boot.actuate.autoconfigure.metrics.export.influx.InfluxMetricsExportAutoConfiguration
  main:
    web-application-type: servlet
    allow-bean-definition-overriding: true

  # ===============================
  # = Jackson Settings
  # ===============================
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
    default-property-inclusion: non_null
    mapper.accept-case-insensitive-enums: true
    deserialization.fail-on-null-for-primitives: false
    deserialization.fail-on-unknown-properties: false
    time-zone: America/Chicago

  # ===============================
  # = DATA SOURCE
  # ===============================
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: perf
        hbm2ddl:
          create_namespaces: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:db;DB_CLOSE_DELAY=-1
    username: sa
    password: sa
    hikari:
      auto-commit: false
      connection-init-sql: "CREATE SCHEMA IF NOT EXISTS perf; SET SCHEMA perf"
  flyway:
    enabled: false
  sql:
    init:
      continue-on-error: false
      mode: embedded

# ===============================
# = Custom
# ===============================
custom:
  project:
    jwt:
      key: "dummy-performance-test-key-that-is-at-least-256-bits-long-for-hmac-sha256-security"
    excluded-accounts:
      - test_brian
  security:
    rate-limit:
      enabled: false

# ===============================
# = Logging
# ===============================
logging:
  config: classpath:logback.xml

# ===============================
# = Health and Metrics
# ===============================
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    export:
      influx:
        enabled: false
